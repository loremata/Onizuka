# Worker Onizuka — processa coda automazioni (alternativa a cron Vercel).
# Richiede secret con CRON_SECRET e URL app.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onizuka-automation-worker
  labels:
    app: onizuka-automation-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onizuka-automation-worker
  template:
    metadata:
      labels:
        app: onizuka-automation-worker
    spec:
      containers:
        - name: worker
          image: node:20-alpine
          command: ["node", "scripts/automation-k8s-worker.mjs"]
          env:
            - name: ONIZUKA_APP_URL
              valueFrom:
                configMapKeyRef:
                  name: onizuka-worker-config
                  key: app_url
            - name: CRON_SECRET
              valueFrom:
                secretKeyRef:
                  name: onizuka-worker-secrets
                  key: cron_secret
            - name: AUTOMATION_WORKER_INTERVAL_MS
              value: "5000"
            - name: AUTOMATION_WORKER_BATCH
              value: "30"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: onizuka-worker-config
data:
  app_url: "https://onizuka.it"
---
apiVersion: v1
kind: Secret
metadata:
  name: onizuka-worker-secrets
type: Opaque
stringData:
  cron_secret: "replace-me"
