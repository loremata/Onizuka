name: Cron audit sheet queue

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Onizuka audit sheet queue cron
        env:
          CRON_URL: ${{ secrets.ONIZUKA_CRON_AUDIT_SHEET_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: imposta ONIZUKA_CRON_AUDIT_SHEET_URL (es. https://onizuka.it/api/cron/audit-sheet-queue) e CRON_SECRET."
            exit 0
          fi
          curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" "${CRON_URL}?limit=5"
