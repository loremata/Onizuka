name: Cron notifications

on:
  # Cron schedulato disabilitato: Vercel cron (vercel.json) copre /api/cron/notifications.
  # workflow_dispatch resta per esecuzione manuale di backup (richiede i secret ONIZUKA_CRON_URL + CRON_SECRET).
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Onizuka notification cron
        env:
          CRON_URL: ${{ secrets.ONIZUKA_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: imposta secrets ONIZUKA_CRON_URL e CRON_SECRET nel repository."
            exit 0
          fi
          curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" "${CRON_URL}"
