name: Cron webhook retry

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger webhook retry cron
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.ONIZUKA_CRON_URL }}/api/cron/webhook-retry"
