name: Cron webhook retry

on:
  # Cron schedulato disabilitato: Vercel cron (vercel.json) copre /api/cron/webhook-retry ogni 15 min.
  # workflow_dispatch resta per esecuzione manuale di backup.
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger webhook retry cron
        env:
          CRON_URL: ${{ secrets.ONIZUKA_CRON_WEBHOOK_RETRY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: imposta ONIZUKA_CRON_WEBHOOK_RETRY_URL (es. https://onizuka.it/api/cron/webhook-retry) e CRON_SECRET."
            exit 0
          fi
          curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" "${CRON_URL}"
