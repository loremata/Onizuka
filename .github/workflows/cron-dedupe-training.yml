name: Cron dedupe training

on:
  # Cron schedulato disabilitato: feature dedupe-training opzionale, non in uso. workflow_dispatch per run manuale.
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dedupe GPU/CPU training job processor
        env:
          CRON_URL: ${{ secrets.ONIZUKA_DEDUPE_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: ONIZUKA_DEDUPE_CRON_URL e CRON_SECRET"
            exit 0
          fi
          curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" "${CRON_URL}"
