name: Cron reach sequences

on:
  # Cron schedulato disabilitato: Vercel cron (vercel.json) copre /api/cron/reach-sequences.
  # workflow_dispatch resta per esecuzione manuale di backup.
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Onizuka reach sequences cron
        env:
          CRON_URL: ${{ secrets.ONIZUKA_CRON_REACH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: imposta ONIZUKA_CRON_REACH_URL (es. https://onizuka.it/api/cron/reach-sequences) e CRON_SECRET."
            exit 0
          fi
          curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" "${CRON_URL}"
